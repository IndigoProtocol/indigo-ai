name: Publish Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - name: Publish @indigoprotocol/shared
        run: npm publish --workspace=@indigoprotocol/shared --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @indigoprotocol/indigo-defi
        run: npm publish --workspace=@indigoprotocol/indigo-defi --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @indigoprotocol/indigo-data
        run: npm publish --workspace=@indigoprotocol/indigo-data --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @indigoprotocol/openclaw-indigo
        run: npm publish --workspace=@indigoprotocol/openclaw-indigo --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Publish @indigoprotocol/indigo-skills
        run: npm publish --workspace=@indigoprotocol/indigo-skills --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true
